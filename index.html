<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aesthetic Three-Step Magical Night, Tree & Sakura Rain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fdf5f6; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            transition: background 2.5s ease-in-out, background-color 2.5s ease-in-out;
            touch-action: none;
            position: relative;
        }

        body.night {
            background-color: #080a13;
            background-image: radial-gradient(circle at 80% 20%, #161b33, #080a13 70%);
        }

        .sky-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 3s ease-in-out;
            z-index: 1;
        }

        body.night .sky-elements {
            opacity: 1;
        }

        .moon {
            position: absolute;
            top: 12%;
            right: 20%;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: transparent;
            box-shadow: 15px 12px 0 0 #fffadd;
        }

        .stars {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 
                15vw 20vh white, 25vw 10vh white, 40vw 35vh white, 
                60vw 15vh white, 75vw 30vh white, 85vw 10vh white, 
                90vw 50vh white, 10vw 60vh white, 35vw 70vh white, 
                55vw 80vh white, 70vw 60vh white, 85vw 85vh white;
            animation: twinkle 3s infinite ease-in-out;
        }

        .stars::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 
                20vw 40vh rgba(255,255,255,0.7), 50vw 50vh rgba(255,255,255,0.7), 
                80vw 25vh rgba(255,255,255,0.7), 30vw 80vh rgba(255,255,255,0.7);
            animation: twinkle 4s infinite ease-in-out reverse;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 1; }
        }

        /* --- TYPING MESSAGE CSS --- */
        .love-message {
            position: absolute;
            top: 15%;
            left: 5%;
            width: 45%;
            color: #ffb6c1;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.3rem;
            font-weight: bold;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(255, 182, 193, 0.8);
            z-index: 100;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .love-message {
                font-size: 1.1rem;
                width: 75%;
                top: 10%;
            }
        }

        #grassCanvas {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none; 
            opacity: 0; 
            transition: opacity 3s ease-in-out;
            z-index: 2;
        }
        
        body.show-nature #grassCanvas {
            opacity: 1; 
        }

        #flowerCanvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 5;
            opacity: 0; 
            transition: opacity 2s ease-in-out;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.4)); 
        }

        .heart-part {
            position: absolute;
            width: 80px; 
            height: 80px;
            cursor: grab;
            z-index: 10;
        }

        .heart-part:active {
            cursor: grabbing;
        }

        .full-heart { 
            position: absolute;
            width: 80px;
            height: 80px;
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 15;
        }

        .full-heart.active { 
            opacity: 1; 
            animation: softPulse 1.5s ease-in-out; 
        }

        @keyframes softPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 107, 129, 0.4)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 25px rgba(255, 107, 129, 0.8)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 107, 129, 0.4)); }
        }

        .hidden { display: none !important; }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffb6c1, #ff6b81);
            box-shadow: 0 0 15px rgba(255, 107, 129, 0.6);
            pointer-events: none;
            z-index: 20;
            animation: pop 1.2s cubic-bezier(0.15, 0.83, 0.66, 1) forwards;
        }

        @keyframes pop {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Background Music -->
    <audio id="bgMusic" src="https://github.com/krishnak962715-web/weplay/raw/refs/heads/main/Love%20Story%20(instrumental)%20music%20%23instrumental%20%23indila%20%23lovestory%20%23instrumentalmusic%20%23shortsvideo%20-%20Graxx.mp3" loop></audio>

    <div class="sky-elements">
        <div class="stars"></div>
        <div class="moon"></div>
    </div>

    <!-- Cute Message Div -->
    <div id="loveMessage" class="love-message"></div>

    <!-- Nature & Special Animation Canvases -->
    <canvas id="grassCanvas"></canvas>
    <canvas id="flowerCanvas"></canvas>

    <!-- ================= FULL HEARTS ================= -->
    <div id="fullHeart1" class="full-heart hidden">
        <svg viewBox="0 0 100 100">
            <defs><linearGradient id="pg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff9aa2"/><stop offset="100%" stop-color="#ff6b81"/></linearGradient></defs>
            <path d="M50,85 C20,60 10,40 10,25 C10,12 22,2 35,2 C43,2 48,7 50,15 C52,7 57,2 65,2 C78,2 90,12 90,25 C90,40 80,60 50,85 Z" fill="url(#pg1)"/>
            <text x="50" y="45" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">SORRY</text>
        </svg>
    </div>
    <div id="fullHeart2" class="full-heart hidden">
        <svg viewBox="0 0 100 100">
            <defs><linearGradient id="pg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff9aa2"/><stop offset="100%" stop-color="#ff6b81"/></linearGradient></defs>
            <path d="M50,85 C20,60 10,40 10,25 C10,12 22,2 35,2 C43,2 48,7 50,15 C52,7 57,2 65,2 C78,2 90,12 90,25 C90,40 80,60 50,85 Z" fill="url(#pg2)"/>
            <text x="50" y="45" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">SMILE</text>
        </svg>
    </div>
    <div id="fullHeart3" class="full-heart hidden">
        <svg viewBox="0 0 100 100">
            <defs><linearGradient id="pg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff9aa2"/><stop offset="100%" stop-color="#ff6b81"/></linearGradient></defs>
            <path d="M50,85 C20,60 10,40 10,25 C10,12 22,2 35,2 C43,2 48,7 50,15 C52,7 57,2 65,2 C78,2 90,12 90,25 C90,40 80,60 50,85 Z" fill="url(#pg3)"/>
            <text x="50" y="45" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">FORGIVE</text>
        </svg>
    </div>

    <!-- ================= BROKEN PIECES ================= -->
    <div class="heart-part left-half" style="top: 25%; left: 20%;">
        <svg viewBox="0 0 100 100" clip-path="polygon(0 0, 50% 0, 45% 25%, 55% 50%, 45% 75%, 50% 100%, 0 100%)">
            <defs><linearGradient id="pg4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff9aa2"/><stop offset="100%" stop-color="#ff6b81"/></linearGradient></defs>
            <path d="M50,85 C20,60 10,40 10,25 C10,12 22,2 35,2 C43,2 48,7 50,15 C52,7 57,2 65,2 C78,2 90,12 90,25 C90,40 80,60 50,85 Z" fill="url(#pg4)"/>
        </svg>
    </div>
    <div class="heart-part right-half" style="top: 30%; left: 35%;">
        <svg viewBox="0 0 100 100" clip-path="polygon(50% 0, 100% 0, 100% 100%, 50% 100%, 45% 75%, 55% 50%, 45% 25%)">
            <defs><linearGradient id="pg5" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff9aa2"/><stop offset="100%" stop-color="#ff6b81"/></linearGradient></defs>
            <path d="M50,85 C20,60 10,40 10,25 C10,12 22,2 35,2 C43,2 48,7 50,15 C52,7 57,2 65,2 C78,2 90,12 90,25 C90,40 80,60 50,85 Z" fill="url(#pg5)"/>
        </svg>
    </div>
    <div class="heart-part left-half" style="top: 65%; left: 60%;">
        <svg viewBox="0 0 100 100" clip-path="polygon(0 0, 50% 0, 45% 25%, 55% 50%, 45% 75%, 50% 100%, 0 100%)">
            <defs><linearGradient id="pg6" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff9aa2"/><stop offset="100%" stop-color="#ff6b81"/></linearGradient></defs>
            <path d="M50,85 C20,60 10,40 10,25 C10,12 22,2 35,2 C43,2 48,7 50,15 C52,7 57,2 65,2 C78,2 90,12 90,25 C90,40 80,60 50,85 Z" fill="url(#pg6)"/>
        </svg>
    </div>
    <div class="heart-part right-half" style="top: 70%; left: 75%;">
        <svg viewBox="0 0 100 100" clip-path="polygon(50% 0, 100% 0, 100% 100%, 50% 100%, 45% 75%, 55% 50%, 45% 25%)">
            <defs><linearGradient id="pg7" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff9aa2"/><stop offset="100%" stop-color="#ff6b81"/></linearGradient></defs>
            <path d="M50,85 C20,60 10,40 10,25 C10,12 22,2 35,2 C43,2 48,7 50,15 C52,7 57,2 65,2 C78,2 90,12 90,25 C90,40 80,60 50,85 Z" fill="url(#pg7)"/>
        </svg>
    </div>
    <div class="heart-part left-half" style="top: 70%; left: 15%;">
        <svg viewBox="0 0 100 100" clip-path="polygon(0 0, 50% 0, 45% 25%, 55% 50%, 45% 75%, 50% 100%, 0 100%)">
            <defs><linearGradient id="pg8" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff9aa2"/><stop offset="100%" stop-color="#ff6b81"/></linearGradient></defs>
            <path d="M50,85 C20,60 10,40 10,25 C10,12 22,2 35,2 C43,2 48,7 50,15 C52,7 57,2 65,2 C78,2 90,12 90,25 C90,40 80,60 50,85 Z" fill="url(#pg8)"/>
        </svg>
    </div>
    <div class="heart-part right-half" style="top: 65%; left: 30%;">
        <svg viewBox="0 0 100 100" clip-path="polygon(50% 0, 100% 0, 100% 100%, 50% 100%, 45% 75%, 55% 50%, 45% 25%)">
            <defs><linearGradient id="pg9" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff9aa2"/><stop offset="100%" stop-color="#ff6b81"/></linearGradient></defs>
            <path d="M50,85 C20,60 10,40 10,25 C10,12 22,2 35,2 C43,2 48,7 50,15 C52,7 57,2 65,2 C78,2 90,12 90,25 C90,40 80,60 50,85 Z" fill="url(#pg9)"/>
        </svg>
    </div>


    <script>
        // --- 1. GRASS & FIREFLIES LOGIC ---
        const gCanvas = document.getElementById('grassCanvas');
        const gCtx = gCanvas.getContext('2d');
        let grassArr = [], firefliesArr = [], isNatureAnimating = false;

        function resizeNatureCanvas() {
            gCanvas.width = window.innerWidth;
            gCanvas.height = window.innerHeight;
            initGrassAndFireflies();
        }
        window.addEventListener('resize', resizeNatureCanvas);

        function initGrassAndFireflies() { 
            grassArr = []; firefliesArr = [];
            for(let i = 0; i < gCanvas.width * 1.5; i++) { 
                grassArr.push({ x: Math.random() * gCanvas.width, ht: Math.random() * 20 + 10, a: Math.random() * Math.PI, s: 0.01 + Math.random() * 0.02 }); 
            }
            for(let i = 0; i < 45; i++) {
                firefliesArr.push({ x: Math.random() * gCanvas.width, y: gCanvas.height - Math.random() * 250, size: Math.random() * 2 + 1.5, speedX: (Math.random() - 0.5) * 0.8, speedY: (Math.random() - 0.5) * 0.8 - 0.1, pulse: Math.random() * Math.PI * 2, wave: Math.random() * Math.PI * 2 });
            }
        }

        function animateNature() {
            gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
            firefliesArr.forEach(f => {
                f.wave += 0.02; f.x += f.speedX + Math.sin(f.wave) * 0.5; f.y += f.speedY; f.pulse += 0.04;
                if(f.x < 0) f.x = gCanvas.width; if(f.x > gCanvas.width) f.x = 0; if(f.y < gCanvas.height - 350) f.y = gCanvas.height;
                let alpha = Math.abs(Math.sin(f.pulse)) * 0.7 + 0.3;
                let gradient = gCtx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size * 2.5);
                gradient.addColorStop(0, `rgba(227, 255, 100, ${alpha})`); gradient.addColorStop(1, 'rgba(227, 255, 100, 0)'); 
                gCtx.beginPath(); gCtx.fillStyle = gradient; gCtx.arc(f.x, f.y, f.size * 2.5, 0, Math.PI * 2); gCtx.fill();
            });
            grassArr.forEach(b => {
                b.a += b.s; let tx = b.x + Math.sin(b.a) * 4; 
                gCtx.beginPath(); gCtx.strokeStyle = '#4dfc8f'; gCtx.lineWidth = 1.2;
                gCtx.moveTo(b.x, gCanvas.height); gCtx.quadraticCurveTo(b.x, gCanvas.height - b.ht/2, tx, gCanvas.height - b.ht); gCtx.stroke();
            });
            if(isNatureAnimating) requestAnimationFrame(animateNature);
        }

        // --- 2. THE MASTER LOGIC: SAKURA FLOWERS & TREE ---
        const fCanvas = document.getElementById('flowerCanvas');
        const fCtx = fCanvas.getContext('2d');
        
        let flowersArr = [];
        let isFlowerAnimating = false;
        
        // Tree Variables
        let growthProgress = 0;
        let isTreeGrowing = false;
        let isTreeReady = false;
        let shouldCollectTips = false;
        let tipsCollected = false;
        let branchTips = [];
        
        // Typing Message Variables
        let isMessageTypingStarted = false;
        const loveMessageText = "You are the magic that makes my world beautiful. I'm sorry for the times I messed up... please forgive me. My heart blooms only for you. Keep smiling, always! ❤️";
        let msgCharIndex = 0;

        function typeMessage() {
            if (msgCharIndex < loveMessageText.length) {
                document.getElementById('loveMessage').innerHTML += loveMessageText.charAt(msgCharIndex);
                msgCharIndex++;
                setTimeout(typeMessage, 80); 
            }
        }

        function resizeFlowerCanvas() { 
            fCanvas.width = window.innerWidth; 
            fCanvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resizeFlowerCanvas);

        function drawTree(ctx, startX, startY, len, angle, width, depth) {
            let growth = Math.min(1, Math.max(0, (growthProgress * 10) - depth * 0.8));
            if (growth <= 0) return;
            
            ctx.save(); ctx.beginPath();
            let g = ctx.createLinearGradient(0, 0, 0, -len);
            g.addColorStop(0, "#3e2723"); g.addColorStop(1, "#6d4c41");
            ctx.strokeStyle = g; ctx.lineWidth = width; ctx.lineCap = "round";
            
            ctx.translate(startX, startY); ctx.rotate(angle * Math.PI / 180);
            
            let curLen = len * growth; 
            let bendX = Math.cos(depth * 150) * (len * 0.08) * growth;
            let endY = -curLen;
            
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(Math.sin(depth * 100) * (len * 0.15) * growth, -curLen / 2, bendX, endY); 
            ctx.stroke();
            
            if (growth >= 1) {
                if (depth > 6) { 
                    if (shouldCollectTips && branchTips.length < 400) {
                        let matrix = ctx.getTransform();
                        let absX = matrix.a * bendX + matrix.c * endY + matrix.e;
                        let absY = matrix.b * bendX + matrix.d * endY + matrix.f;
                        branchTips.push({x: absX, y: absY});
                    }
                    ctx.restore(); return; 
                }
                drawTree(ctx, bendX, endY, len * 0.74, angle - 26, width * 0.65, depth + 1);
                drawTree(ctx, bendX, endY, len * 0.74, angle + 26, width * 0.65, depth + 1);
            }
            ctx.restore();
        }

        function drawFlowerShape(ctx, scale = 0.4) { 
            ctx.save(); ctx.scale(scale, scale);
            for (let i = 0; i < 5; i++) {
                ctx.save(); ctx.rotate((i * 72) * Math.PI / 180);
                let g = ctx.createLinearGradient(-10, -36, 10, 0);
                g.addColorStop(0, "#fff0f3"); g.addColorStop(0.5, "#ffb6c1"); g.addColorStop(1, "#ff9a9e");
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.moveTo(0, -30.6); ctx.lineTo(6.5, -36); ctx.lineTo(13, -23.4); ctx.lineTo(6.5, 0); ctx.lineTo(0, 0); ctx.lineTo(-6.5, 0); ctx.lineTo(-13, -23.4); ctx.lineTo(-6.5, -36);
                ctx.closePath(); ctx.fill(); ctx.restore();
            }
            ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fillStyle = "#d15c74"; ctx.fill();
            const dots = [{x:0, y:-8}, {x:7, y:-4}, {x:7, y:5}, {x:0, y:9}, {x:-7, y:5}, {x:-7, y:-4}];
            ctx.fillStyle = "#ffdf73";
            for (let dot of dots) { ctx.beginPath(); ctx.arc(dot.x, dot.y, 1.8, 0, Math.PI * 2); ctx.fill(); }
            ctx.restore();
        }

        function initMasterSequence() {
            flowersArr = []; branchTips = [];
            for(let i = 0; i < 220; i++) {
                flowersArr.push({
                    x: Math.random() * window.innerWidth, y: Math.random() * -800 - 50,
                    speedY: Math.random() * 2.5 + 1.5, speedX: (Math.random() - 0.5) * 1.5,
                    scale: Math.random() * 0.3 + 0.2, 
                    angle: Math.random() * Math.PI * 2, spinSpeed: (Math.random() - 0.5) * 0.05,
                    sway: Math.random() * Math.PI * 2, swaySpeed: Math.random() * 0.02 + 0.01,
                    settled: false, targetX: null, targetY: null, attached: false
                });
            }
        }

        function animateMasterSequence() {
            if(!isFlowerAnimating) return;
            fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);

            let allFlowersSettled = true;
            
            let treeLen = fCanvas.height * 0.13; 
            let treeWidth = Math.max(8, fCanvas.width * 0.012); 
            let treePosX = fCanvas.width * 0.75; 
            let treePosY = fCanvas.height;

            if (isTreeGrowing) {
                if (growthProgress < 1) {
                    growthProgress += 0.008; 
                } else if (!tipsCollected) {
                    shouldCollectTips = true;
                }
                
                drawTree(fCtx, treePosX, treePosY, treeLen, 0, treeWidth, 0);

                if (shouldCollectTips) {
                    tipsCollected = true;
                    shouldCollectTips = false;
                    isTreeReady = true; 
                    isTreeGrowing = false; 
                    
                    if (!isMessageTypingStarted) {
                        isMessageTypingStarted = true;
                        typeMessage();
                    }
                }
            } else if (isTreeReady) {
                drawTree(fCtx, treePosX, treePosY, treeLen, 0, treeWidth, 0);
            }

            flowersArr.forEach(f => {
                if (!isTreeReady) {
                    if (!f.settled) {
                        f.y += f.speedY; f.sway += f.swaySpeed; f.x += f.speedX + Math.sin(f.sway) * 0.5; f.angle += f.spinSpeed; 
                        
                        let groundLevel = fCanvas.height - (Math.random() * 15);
                        if(f.y > groundLevel) {
                            f.settled = true; 
                            f.y = groundLevel; 
                        } else {
                            allFlowersSettled = false; 
                        }
                    }
                } else {
                    if (!f.targetX && branchTips.length > 0) {
                        let tip = branchTips[Math.floor(Math.random() * branchTips.length)];
                        f.targetX = tip.x + (Math.random() - 0.5) * 55; 
                        f.targetY = tip.y + (Math.random() - 0.5) * 55;
                    }
                    
                    if (f.targetX && !f.attached) {
                        let dx = f.targetX - f.x, dy = f.targetY - f.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist > 5) {
                            f.x += dx * 0.04; f.y += dy * 0.04; f.angle += 0.15; 
                        } else {
                            f.attached = true; f.x = f.targetX; f.y = f.targetY;
                        }
                    } else if (f.attached) {
                        f.angle = Math.sin(Date.now() * 0.001 + f.sway) * 0.2; 
                    }
                }

                fCtx.save(); fCtx.translate(f.x, f.y); fCtx.rotate(f.angle);
                drawFlowerShape(fCtx, f.scale); 
                fCtx.restore();
            });

            if (allFlowersSettled && !isTreeGrowing && !isTreeReady && flowersArr.length > 0) {
                isTreeGrowing = true; 
            }

            requestAnimationFrame(animateMasterSequence);
        }

        function triggerFinalMagic() {
            fCanvas.style.opacity = 1; 
            isFlowerAnimating = true;
            resizeFlowerCanvas();
            initMasterSequence();
            animateMasterSequence(); 
        }

        // --- 3. HEART DRAG LOGIC ---
        let heartsCompletedCount = 0; 
        let active = null, offsetX, offsetY;
        const allPieces = [...document.querySelectorAll('.heart-part')];

        function startDrag(e) {
            if (this.dataset.snapped === "true") return;
            active = this;
            const evt = e.touches ? e.touches[0] : e;
            offsetX = evt.clientX - active.offsetLeft; offsetY = evt.clientY - active.offsetTop;
            active.style.zIndex = 20;
        }

        function onDrag(e) {
            if (!active) return;
            e.preventDefault(); const evt = e.touches ? e.touches[0] : e;
            active.style.left = (evt.clientX - offsetX) + 'px'; active.style.top = (evt.clientY - offsetY) + 'px';
            
            const isLeft = active.classList.contains('left-half');
            const opposites = isLeft ? document.querySelectorAll('.right-half') : document.querySelectorAll('.left-half');
            
            for (let opp of opposites) {
                if (opp.dataset.snapped === "true") continue;
                const r1 = active.getBoundingClientRect(), r2 = opp.getBoundingClientRect();
                
                if (Math.abs(r1.left - r2.left) < 35 && Math.abs(r1.top - r2.top) < 35) {
                    active.dataset.snapped = "true"; opp.dataset.snapped = "true";
                    heartsCompletedCount++;
                    
                    const fullHeart = document.getElementById('fullHeart' + heartsCompletedCount);
                    fullHeart.style.left = (isLeft ? active.style.left : opp.style.left);
                    fullHeart.style.top = (isLeft ? active.style.top : opp.style.top);
                    
                    fullHeart.classList.remove('hidden'); fullHeart.classList.add('active');
                    active.classList.add('hidden'); opp.classList.add('hidden');
                    
                    const currentCount = heartsCompletedCount; 
                    
                    setTimeout(() => {
                        const rect = fullHeart.getBoundingClientRect();
                        createBubbles(rect.left + (rect.width / 2), rect.top + (rect.height / 2));
                        fullHeart.classList.remove('active'); fullHeart.classList.add('hidden');
                        
                        if(currentCount === 1) {
                            document.body.classList.add('night');
                            // BG MUSIC PLAY YAHAN ADD KIYA HAI!
                            const bgMusic = document.getElementById('bgMusic');
                            if(bgMusic) bgMusic.play().catch(e => console.log("Audio block: ", e));
                        }
                        else if(currentCount === 2) {
                            document.body.classList.add('show-nature');
                            if(!isNatureAnimating) { isNatureAnimating = true; resizeNatureCanvas(); animateNature(); }
                        } else if(currentCount === 3) triggerFinalMagic();
                    }, 1500);

                    active = null; break;
                }
            }
        }

        function stopDrag() { if(active) active.style.zIndex = 10; active = null; }

        function createBubbles(x, y) {
            for (let i = 0; i < 35; i++) { 
                const bubble = document.createElement('div'); bubble.classList.add('bubble'); document.body.appendChild(bubble);
                bubble.style.left = `${x}px`; bubble.style.top = `${y}px`;
                const angle = Math.random() * Math.PI * 2, speed = Math.random() * 120 + 40; 
                bubble.style.setProperty('--tx', `${Math.cos(angle) * speed}px`); bubble.style.setProperty('--ty', `${Math.sin(angle) * speed}px`);
                const size = Math.random() * 10 + 4; bubble.style.width = `${size}px`; bubble.style.height = `${size}px`;
                setTimeout(() => bubble.remove(), 1200);
            }
        }

        allPieces.forEach(p => { p.addEventListener('mousedown', startDrag); p.addEventListener('touchstart', startDrag, { passive: false }); });
        document.addEventListener('mousemove', onDrag); document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchmove', onDrag, { passive: false }); document.addEventListener('touchend', stopDrag);
    </script>
</body>
</html>
